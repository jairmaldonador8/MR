<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Montana Realty Co.</title>
  <meta name="description" content="La página que buscas no existe. Vuelve al inicio de Montana Realty Co.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="/assets/logo-mr.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Lato',Helvetica,Arial,sans-serif;
      background:#1a1f2e;
      color:#e8e6e1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:560px;text-align:center}
    .eyebrow{
      font-size:.72rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:#c9a96e;
      font-weight:500;
      margin-bottom:24px;
    }
    h1{
      font-family:'Cinzel',Georgia,serif;
      font-size:clamp(72px,14vw,140px);
      color:#c9a96e;
      letter-spacing:.06em;
      font-weight:500;
      line-height:1;
      margin-bottom:8px;
    }
    h2{
      font-family:'Cinzel',Georgia,serif;
      font-size:clamp(20px,3vw,28px);
      color:#e8e6e1;
      font-weight:400;
      margin-bottom:14px;
      letter-spacing:.02em;
    }
    p{
      font-size:1rem;
      color:#a8a8a8;
      line-height:1.6;
      margin-bottom:36px;
    }
    .actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    a.btn{
      display:inline-block;
      padding:14px 32px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      font-size:.78rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      transition:all .3s;
    }
    .btn-primary{
      background:#c9a96e;
      color:#1a1f2e;
      border:1.5px solid #c9a96e;
    }
    .btn-primary:hover{background:#d4b67e;border-color:#d4b67e}
    .btn-ghost{
      background:transparent;
      color:#e8e6e1;
      border:1.5px solid rgba(255,255,255,.25);
    }
    .btn-ghost:hover{border-color:#c9a96e;color:#c9a96e}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Montana Realty Co.</div>
    <h1>404</h1>
    <h2>La propiedad que buscas no fue encontrada</h2>
    <p>Es posible que el enlace haya cambiado o que la página ya no esté disponible. Te invitamos a volver al inicio o explorar nuestro catálogo de propiedades.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Volver al inicio</a>
      <a class="btn btn-ghost" href="/propiedades.html">Ver propiedades</a>
    </div>
  </main>
</body>
</html>
