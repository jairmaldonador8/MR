<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav-h:68px;
  --bar-h:60px;
  --red:#ffffff;
  --gold:#c9a96e;
  --black:#0d0d0d;
  --sans:'Poppins',Helvetica,Arial,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
}

html{-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:#fff;color:#111;overflow-x:hidden}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:var(--nav-h);
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid #e5e5e5;
  transition:height .3s;
}
.nav-logo{display:flex;flex-direction:column;gap:3px;text-decoration:none}
.nav-logo-img{height:32px;width:auto;display:block;filter:brightness(0)}
.nav-logo-sub{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.4)}
.nav-center{display:flex;align-items:center}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.55);text-decoration:none;transition:color .2s;position:relative;padding-bottom:3px}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:currentColor;transition:width .3s ease;transform-origin:left}
.nav-links a:hover,.nav-links a.active{color:#111}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.45);text-decoration:none;transition:color .2s}
.nav-sub:hover{color:#111}
.nav-action{font-size:11px;letter-spacing:.06em;color:#111;font-family:var(--sans);font-weight:500;padding:9px 22px;border:1.5px solid rgba(0,0,0,.3);border-radius:30px;transition:all .3s;text-decoration:none;display:inline-block}
.nav-action:hover{background:#111;color:#fff;border-color:#111}
.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px;cursor:pointer}
.nav-ham span{display:block;width:22px;height:1.5px;background:#111;transition:all .3s}

/* ── SEARCH BAR ── */
#searchbar{
  position:sticky;top:var(--nav-h);z-index:800;
  background:#fff;border-bottom:1px solid #e5e5e5;
  padding:10px 24px;
  display:flex;align-items:center;gap:8px;
  flex-wrap:wrap;
  min-height:var(--bar-h);
}
.search-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;
  padding:0 14px;height:38px;flex:1 1 220px;max-width:340px;
}
.search-input-wrap svg{opacity:.4;flex-shrink:0}
.search-input{
  border:none;background:transparent;outline:none;
  font-family:var(--sans);font-size:13px;color:#111;width:100%;
}
.search-input::placeholder{color:#aaa}
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.pill{
  display:flex;align-items:center;gap:6px;
  height:38px;padding:0 14px;
  border:1px solid #e5e5e5;border-radius:8px;
  background:#fff;font-family:var(--sans);font-size:12px;
  color:#333;cursor:pointer;white-space:nowrap;
  transition:background .2s,border-color .2s;
  position:relative;
}
.pill:hover{background:#f5f5f5;border-color:#ccc}
.pill svg{opacity:.5}
.pill select{
  position:absolute;inset:0;opacity:0;cursor:pointer;
  font-family:var(--sans);font-size:12px;
}
.bar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.view-toggle{display:flex;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.view-btn{
  height:38px;padding:0 16px;font-family:var(--sans);font-size:12px;
  font-weight:500;letter-spacing:.04em;border:none;cursor:pointer;
  transition:background .2s,color .2s;
}
.view-btn.active{background:#111;color:#fff}
.view-btn:not(.active){background:#fff;color:#666}

/* ── MAIN LAYOUT ── */
#main{
  display:flex;
  height:calc(100vh - var(--nav-h) - var(--bar-h));
  margin-top:calc(var(--nav-h) + var(--bar-h));
}

/* ── MAP SIDE ── */
#map-side{
  width:50%;flex-shrink:0;
  position:sticky;top:calc(var(--nav-h) + var(--bar-h));
  height:calc(100vh - var(--nav-h) - var(--bar-h));
  background:#e8e4e0;
}
#map-side iframe{
  width:100%;height:100%;border:none;display:block;
}
#map-side.hidden{display:none}

/* ── LIST SIDE ── */
#list-side{
  flex:1;overflow-y:auto;
  background:#fafafa;
}
#list-side::-webkit-scrollbar{width:4px}
#list-side::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

.list-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid #eee;
  background:#fff;
  position:sticky;top:0;z-index:10;
}
.result-count{font-size:13px;color:#666;font-weight:400}
.result-count strong{color:#111;font-weight:600}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
.sort-wrap select{
  font-family:var(--sans);font-size:12px;color:#333;
  border:1px solid #e5e5e5;border-radius:6px;padding:5px 10px;
  background:#fff;cursor:pointer;outline:none;
}

/* ── PROPERTY GRID ── */
.prop-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  padding:20px 20px 40px;
}
.prop-card{
  background:#fff;border:1px solid #eee;border-radius:12px;
  overflow:hidden;cursor:pointer;
  transition:box-shadow .3s,transform .3s;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;
}
.prop-card:hover{
  box-shadow:0 8px 32px rgba(0,0,0,.1);
  transform:translateY(-3px);
}
.prop-img{
  position:relative;aspect-ratio:4/3;overflow:hidden;background:#f0f0f0;
}
.prop-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .6s cubic-bezier(.25,.46,.45,.94);
}
.prop-card:hover .prop-img img{transform:scale(1.05)}
.prop-badge{
  position:absolute;top:12px;left:12px;
  background:#111;color:#fff;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;padding:4px 10px;border-radius:4px;font-weight:500;
}
.prop-badge.exclusive{background:var(--red)}
.prop-body{padding:16px}
.prop-price{font-family:var(--serif);font-size:20px;font-weight:300;color:#111;line-height:1;margin-bottom:6px}
.prop-price-note{font-size:10px;color:#999;font-weight:400;margin-left:4px}
.prop-specs{font-size:11px;color:#555;margin-bottom:6px;line-height:1.5}
.prop-specs strong{color:#111;font-weight:500}
.prop-addr{font-size:11px;color:#aaa;margin-bottom:12px}
.prop-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;border-top:1px solid #f0f0f0;
}
.prop-actions{display:flex;gap:10px}
.prop-btn{
  width:30px;height:30px;border:1px solid #e5e5e5;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;cursor:pointer;transition:border-color .2s,background .2s;
  color:#666;
}
.prop-btn:hover{border-color:#999;background:#f5f5f5;color:#111}
.prop-tag{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--red);font-weight:600;
}

/* ── STATES ── */
.prop-state{
  grid-column:1/-1;text-align:center;padding:60px 20px;
  font-family:var(--sans);font-size:13px;color:#888;font-weight:400;
}
.prop-state.loading{animation:propPulse 1.6s ease-in-out infinite}
@keyframes propPulse{0%,100%{opacity:.5}50%{opacity:.95}}
.prop-state.error{color:#b91c1c}
.prop-card.highlight{box-shadow:0 0 0 2px var(--gold),0 12px 36px rgba(201,169,110,.25)}

/* ── PAGINATION ── */
.prop-pagination{
  display:flex;justify-content:center;gap:6px;flex-wrap:wrap;
  padding:24px 16px 40px;border-top:1px solid #eee;background:#fff;
}
.page-btn{
  min-width:36px;padding:8px 12px;background:#fff;border:1px solid #e5e5e5;
  color:#444;font-family:var(--sans);font-size:12px;font-weight:500;
  border-radius:6px;cursor:pointer;transition:all .25s;
}
.page-btn:hover{border-color:#c9a96e;color:#111}
.page-btn.active{background:#111;color:#fff;border-color:#111;font-weight:600}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{display:flex;align-items:center;padding:0 12px;font-size:12px;color:#888;font-family:var(--sans)}

/* ── FOOTER NOTE ── */
.footer-note{
  text-align:center;padding:40px 24px;
  border-top:1px solid #eee;
  font-size:12px;color:#bbb;
}
.footer-note a{color:#888;text-decoration:none}
.footer-note a:hover{color:#333}

/* ── MOBILE ── */
@media(max-width:900px){
  #nav{padding:0 20px}
  .nav-links,.nav-right .nav-sub,.nav-right .nav-action{display:none}
  .nav-ham{display:flex}
  #map-side{width:100%;height:45vh;min-height:340px;position:relative;top:auto;flex-shrink:1}
  #map-side.hidden{display:none}
  #list-side{width:100%}
  #main{flex-direction:column;height:auto;margin-top:calc(var(--nav-h) + var(--bar-h))}
  .prop-grid{grid-template-columns:1fr;padding:16px}
  #searchbar{gap:6px;padding:8px 16px}
  .search-input-wrap{max-width:100%;flex:1 1 100%}
  .filters{display:none}
  .bar-right{margin-left:0}
}

/* MOB MENU */
.mob-menu{position:fixed;inset:0;background:#fff;z-index:950;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;opacity:0;pointer-events:none;transition:opacity .4s}
.mob-menu.open{opacity:1;pointer-events:all}
.mob-menu a{font-size:clamp(28px,7vw,44px);font-weight:400;color:#111;text-decoration:none;letter-spacing:-.01em;transition:color .2s}
.mob-menu a:hover{color:var(--red)}
.mob-close{position:absolute;top:20px;right:24px;background:none;border:none;font-size:28px;cursor:pointer;color:#444}

/* ── INTERACTIVE MAP (Leaflet) ── */
#propertiesMap{width:100%;height:100%;background:#1a1f2e}
.custom-pin-wrapper{background:transparent;border:none}
.custom-property-pin{background:#c9a96e;border:3px solid #1a1f2e;border-radius:50%;width:36px;height:36px;box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#1a1f2e;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;transition:all .2s ease}
.custom-property-pin:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(201,169,110,.5)}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(201,169,110,.4)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:#c9a96e!important;color:#1a1f2e!important;font-family:var(--sans)!important;font-weight:600!important;border:3px solid #1a1f2e!important;box-shadow:0 4px 12px rgba(0,0,0,.3)!important}
.marker-cluster span{font-size:14px!important}
.property-popup{font-family:var(--sans);min-width:220px;max-width:260px}
.property-popup-image{width:100%;height:130px;background:#232a3d;background-size:cover;background-position:center;border-radius:4px;margin-bottom:10px}
.property-popup-zone{font-size:.7rem;letter-spacing:.1em;color:#c9a96e;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.property-popup-title{font-family:var(--serif);font-size:1.05rem;font-weight:500;color:#1a1f2e;margin:0 0 6px 0;line-height:1.2}
.property-popup-price{font-family:var(--serif);font-size:1.25rem;color:#c9a96e;font-weight:600;margin-bottom:6px}
.property-popup-details{font-size:.82rem;color:#6b7280;margin-bottom:10px}
.property-popup-link{display:inline-block;background:#c9a96e;color:#1a1f2e;padding:7px 14px;border-radius:4px;text-decoration:none;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;transition:all .2s}
.property-popup-link:hover{background:#d4b67e;transform:translateY(-1px)}
.leaflet-popup-content-wrapper{background:#fff;border-radius:8px!important;padding:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.2)!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip{background:#fff!important}
</style>

<script>
// ── MOBILE MENU ──
function toggleMob(){
  document.getElementById('mobMenu').classList.toggle('open');
}
function closeMob(){
  document.getElementById('mobMenu').classList.remove('open');
}

// ── MAP / LIST TOGGLE ──
function setView(v){
  const mapSide=document.getElementById('map-side');
  const btnMapa=document.getElementById('btnMapa');
  const btnLista=document.getElementById('btnLista');
  if(v==='mapa'){
    mapSide.classList.remove('hidden');
    btnMapa.classList.add('active');
    btnLista.classList.remove('active');
    // Leaflet stale-size fix when container becomes visible again
    if(window.propMap) setTimeout(()=>window.propMap.invalidateSize(),100);
  } else {
    mapSide.classList.add('hidden');
    btnLista.classList.add('active');
    btnMapa.classList.remove('active');
  }
}

// ── PILL LABEL UPDATE ──
function updateLabel(labelId,sel,defaultLabel){
  const label=document.getElementById(labelId);
  const opt=sel.options[sel.selectedIndex];
  label.textContent=opt.value?opt.text:defaultLabel;
  applyFilters();
}

// ── API-DRIVEN PROPERTY LIST (EasyBroker via /api/properties) ──
const PER_PAGE=20;
const state={page:1,total:0,totalPages:1,results:[],highlightId:null};
const grid=document.getElementById('propGrid');
const pagWrap=document.getElementById('propPagination');

function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function buildApiParams(){
  const q=new URLSearchParams();
  q.set('page',String(state.page));
  q.set('limit',String(PER_PAGE));

  const search=document.getElementById('searchInput').value.trim();
  const zona=document.getElementById('zonaFilter').value;
  const tipo=document.getElementById('tipoFilter').value;
  const precio=document.getElementById('precioFilter').value;
  const inmueble=document.getElementById('inmuebleFilter').value;

  if(search) q.set('search',search);
  if(zona) q.set('location',zona);
  if(inmueble) q.set('property_type',inmueble);
  if(tipo==='En Venta') q.set('operation_type','sale');
  else if(tipo==='En Renta') q.set('operation_type','rental');
  if(precio==='5'){q.set('max_price','5000000');}
  else if(precio==='10'){q.set('min_price','5000001');q.set('max_price','10000000');}
  else if(precio==='20'){q.set('min_price','10000001');q.set('max_price','20000000');}
  else if(precio==='20+'){q.set('min_price','20000001');}
  return q;
}

function applyClientFilters(list){
  const minRec=parseInt(document.getElementById('recFilter').value)||0;
  return list.filter(p=>{
    if(!p.title_image_full) return false;
    if(minRec && (parseInt(p.bedrooms)||0)<minRec) return false;
    return true;
  });
}

function sortClientSide(list){
  const by=document.getElementById('sortSelect').value;
  const out=list.slice();
  out.sort((a,b)=>{
    const pa=(a.operations&&a.operations[0]&&a.operations[0].amount)||0;
    const pb=(b.operations&&b.operations[0]&&b.operations[0].amount)||0;
    if(by==='price-asc') return pa-pb;
    if(by==='price-desc') return pb-pa;
    return new Date(b.updated_at||0)-new Date(a.updated_at||0);
  });
  return out;
}

function renderProperty(p){
  const op=(p.operations&&p.operations[0])||{};
  const opType=op.type==='sale'?'En Venta':(op.type==='rental'?'En Renta':'');
  const priceStr=op.formatted_amount||'Consultar precio';
  const m=String(priceStr).match(/^(\$?[\d.,]+)\s*(MXN|USD)?/i);
  const priceMain=m?m[1]:priceStr;
  const priceCurr=m&&m[2]?m[2]:(op.currency||'MXN');
  const locParts=(p.location||'').split(',');
  const zona=(locParts[0]||'').trim();
  const ciudad=(locParts[1]||'').trim();
  const addr=[zona,ciudad].filter(Boolean).join(', ')||'Ubicación reservada';
  const specs=[];
  specs.push(`<strong>${escHtml(p.property_type||'Propiedad')}</strong>`);
  if(opType) specs.push(escHtml(opType));
  if(p.bedrooms) specs.push(`${p.bedrooms} rec`);
  if(p.bathrooms) specs.push(`${p.bathrooms} baños`);
  if(p.construction_size) specs.push(`${p.construction_size} m²`);
  else if(p.lot_size) specs.push(`${p.lot_size} m² terreno`);
  const tag=op.type==='rental'?'Renta':(p.property_type==='Terreno'?'Inversión':'Disponible');
  const id=encodeURIComponent(p.public_id||'');
  const highlight=(state.highlightId&&p.public_id===state.highlightId)?' highlight':'';
  const img=p.title_image_full||p.title_image_thumb||'';
  return `
    <a class="prop-card${highlight}" href="propiedad.html?id=${id}" data-id="${escHtml(p.public_id||'')}">
      <div class="prop-img">
        <img src="${escHtml(img)}" alt="${escHtml(p.title||'Propiedad')}" loading="lazy">
        ${opType?`<span class="prop-badge">${escHtml(opType)}</span>`:''}
      </div>
      <div class="prop-body">
        <div class="prop-price">${escHtml(priceMain)} <span class="prop-price-note">${escHtml(priceCurr)}</span></div>
        <div class="prop-specs">${specs.join(' · ')}</div>
        <div class="prop-addr">${escHtml(addr)}</div>
        <div class="prop-footer">
          <span class="prop-tag">${escHtml(tag)}</span>
          <div class="prop-actions">
            <button type="button" class="prop-btn" title="Agendar visita" onclick="event.preventDefault();event.stopPropagation();window.location.href='index.html#cta'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </button>
            <button type="button" class="prop-btn" title="Compartir" onclick="event.preventDefault();event.stopPropagation();navigator.share?navigator.share({title:'Montana Realty',url:location.origin+'/propiedad.html?id=${id}'}):navigator.clipboard.writeText(location.origin+'/propiedad.html?id=${id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
          </div>
        </div>
      </div>
    </a>`;
}

function renderResults(){
  const filtered=applyClientFilters(state.results);
  const sorted=sortClientSide(filtered);
  document.getElementById('countNum').textContent=state.total;
  if(!sorted.length){
    grid.innerHTML='<div class="prop-state">Sin resultados que coincidan con tu búsqueda.</div>';
    return;
  }
  grid.innerHTML=sorted.map(renderProperty).join('');
  if(state.highlightId){
    const el=grid.querySelector(`.prop-card[data-id="${CSS.escape(state.highlightId)}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function renderPagination(){
  if(state.totalPages<=1){pagWrap.innerHTML='';return;}
  const p=state.page,t=state.totalPages;
  let h='';
  h+=`<button class="page-btn" data-page="${p-1}" ${p<=1?'disabled':''}>← Anterior</button>`;
  const start=Math.max(1,p-2),end=Math.min(t,start+4);
  for(let i=start;i<=end;i++){
    h+=`<button class="page-btn${i===p?' active':''}" data-page="${i}">${i}</button>`;
  }
  h+=`<span class="page-info">Página ${p} de ${t}</span>`;
  h+=`<button class="page-btn" data-page="${p+1}" ${p>=t?'disabled':''}>Siguiente →</button>`;
  pagWrap.innerHTML=h;
  pagWrap.querySelectorAll('.page-btn[data-page]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const n=parseInt(btn.dataset.page);
      if(isNaN(n)||n<1||n>t||n===p) return;
      state.page=n;
      loadPage();
      window.scrollTo({top:document.getElementById('searchbar').offsetTop,behavior:'smooth'});
    });
  });
}

let currentReq=0;
async function loadPage(){
  const reqId=++currentReq;
  grid.innerHTML='<div class="prop-state loading">Cargando propiedades…</div>';
  pagWrap.innerHTML='';
  try{
    const r=await fetch('/api/properties?'+buildApiParams().toString());
    if(reqId!==currentReq) return; // stale response
    if(!r.ok) throw new Error('API '+r.status);
    const d=await r.json();
    state.total=(d.pagination&&d.pagination.total)||0;
    state.totalPages=Math.max(1,Math.ceil(state.total/PER_PAGE));
    state.results=d.content||[];
    renderResults();
    renderPagination();
  }catch(e){
    if(reqId!==currentReq) return;
    console.error(e);
    grid.innerHTML='<div class="prop-state error">No se pudieron cargar las propiedades. Intenta de nuevo más tarde.</div>';
    pagWrap.innerHTML='';
  }
}

function applyFilters(){
  state.page=1;
  loadPage();
  loadMapMarkers();
}

function sortCards(){
  // Re-render only the current page sorted client-side
  renderResults();
}

// Live search (debounced)
let searchTimer;
document.getElementById('searchInput').addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(applyFilters,400);
});

// ── PRE-APPLY URL PARAMS (?operacion=venta|renta, ?id=XX) ──
(function(){
  const params=new URLSearchParams(window.location.search);
  const op=params.get('operacion');
  if(op){
    const map={venta:'En Venta',renta:'En Renta'};
    const v=map[op.toLowerCase()];
    if(v){
      const tipoFilter=document.getElementById('tipoFilter');
      if(tipoFilter){
        tipoFilter.value=v;
        const lbl=document.getElementById('tipoLabel');
        if(lbl) lbl.textContent=v;
      }
    }
  }
  const id=params.get('id');
  if(id) state.highlightId=id;
})();

// ── INTERACTIVE MAP (Leaflet + clustering) ──
let mapInitialized=false;
let markersCluster=null;
let mapReqId=0;

function initPropertiesMap(){
  if(mapInitialized||typeof L==='undefined') return;
  const m=L.map('propertiesMap',{zoomControl:true,scrollWheelZoom:true}).setView([25.6573,-100.4023],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom:20,
    subdomains:'abcd'
  }).addTo(m);
  markersCluster=L.markerClusterGroup({
    showCoverageOnHover:false,
    maxClusterRadius:50,
    iconCreateFunction(cluster){
      const count=cluster.getChildCount();
      let size='small';
      if(count>=10) size='medium';
      if(count>=50) size='large';
      return L.divIcon({html:`<div><span>${count}</span></div>`,className:`marker-cluster marker-cluster-${size}`,iconSize:L.point(40,40)});
    }
  });
  m.addLayer(markersCluster);
  window.propMap=m;
  mapInitialized=true;
}

function getCoords(p){
  const lat=p.latitude||(p.location&&p.location.latitude);
  const lng=p.longitude||(p.location&&p.location.longitude);
  const fLat=parseFloat(lat),fLng=parseFloat(lng);
  if(!isFinite(fLat)||!isFinite(fLng)) return null;
  if(fLat===0&&fLng===0) return null;
  return [fLat,fLng];
}

function createPropertyMarker(p){
  const coords=getCoords(p);
  if(!coords) return null;
  const icon=L.divIcon({
    html:'<div class="custom-property-pin">🏠</div>',
    className:'custom-pin-wrapper',
    iconSize:[36,36],
    iconAnchor:[18,18]
  });
  const marker=L.marker(coords,{icon});
  const op=(p.operations&&p.operations[0])||{};
  const price=op.formatted_amount||'Consultar';
  const title=cleanTitle(p.title||'Propiedad');
  const locStr=(typeof p.location==='string')?p.location:((p.location&&(p.location.name||p.location.full_address))||'');
  const zone=(locStr.split(',')[0]||'').trim();
  const details=[];
  if(p.bedrooms) details.push(`${p.bedrooms} rec`);
  if(p.bathrooms) details.push(`${p.bathrooms} baños`);
  if(p.construction_size) details.push(`${p.construction_size} m²`);
  const img=p.title_image_thumb||p.title_image_full||'';
  const id=encodeURIComponent(p.public_id||'');
  const popup=`
    <div class="property-popup">
      ${img?`<div class="property-popup-image" style="background-image:url('${escHtml(img).replace(/'/g,"\\'")}')"></div>`:''}
      ${zone?`<div class="property-popup-zone">${escHtml(zone)}</div>`:''}
      <h3 class="property-popup-title">${escHtml(title)}</h3>
      <div class="property-popup-price">${escHtml(price)}</div>
      ${details.length?`<div class="property-popup-details">${escHtml(details.join(' · '))}</div>`:''}
      <a href="propiedad.html?id=${id}" class="property-popup-link">Ver propiedad</a>
    </div>`;
  marker.bindPopup(popup,{maxWidth:300,minWidth:220});
  return marker;
}

function cleanTitle(t){
  return String(t||'Propiedad').replace(/\$[\d,.]+(\s*M\.?N?\.?)?/gi,'').trim()||'Propiedad';
}

async function loadMapMarkers(){
  if(!mapInitialized||!markersCluster) return;
  const reqId=++mapReqId;
  markersCluster.clearLayers();
  // Reuse current filter params, but no pagination — fetch all matching pages.
  const baseParams=buildApiParams();
  baseParams.set('limit','50');
  const minRec=parseInt(document.getElementById('recFilter').value)||0;
  const collected=[];
  const maxPages=8; // safety: 8 * 50 = 400 max
  for(let pg=1;pg<=maxPages;pg++){
    if(reqId!==mapReqId) return; // stale
    baseParams.set('page',String(pg));
    let r;
    try{r=await fetch('/api/properties?'+baseParams.toString());}
    catch(e){console.error('map fetch error',e);break;}
    if(!r.ok) break;
    const d=await r.json();
    const list=d.content||[];
    if(!list.length) break;
    collected.push(...list);
    const next=d.pagination&&d.pagination.next_page;
    if(!next) break;
  }
  if(reqId!==mapReqId) return;
  const filtered=minRec?collected.filter(p=>(parseInt(p.bedrooms)||0)>=minRec):collected;
  const markers=[];
  filtered.forEach(p=>{
    const m=createPropertyMarker(p);
    if(m){markersCluster.addLayer(m);markers.push(m);}
  });
  console.log(`Map: ${markers.length} markers from ${filtered.length} properties`);
  if(markers.length>0){
    const group=L.featureGroup(markers);
    window.propMap.fitBounds(group.getBounds(),{padding:[40,40],maxZoom:14});
  }
}

// Initial load
loadPage();
window.addEventListener('load',()=>{
  initPropertiesMap();
  loadMapMarkers();
});
</script>
